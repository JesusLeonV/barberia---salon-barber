<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil Barbero</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <div class="card" style="width: 300px; text-align: center;">
        <img id="foto" src="" style="width:150px; height:150px; border-radius:50%; border: 3px solid #eab308;">
        <h1 id="nombre" style="margin-top:15px;"></h1>
        <p id="bio" style="color:#aaa;"></p>
        <button onclick="window.history.back()" class="btn-submit" style="margin-top:20px;">Volver a la Agenda</button>
    </div>
    <script>
        const id = window.location.pathname.split('/').pop();
        fetch(`/api/barbero/${id}`).then(r => r.json()).then(b => {
            document.getElementById('nombre').innerText = b.nombre;
            document.getElementById('foto').src = b.foto_url;
            document.getElementById('bio').innerText = b.bio || "Profesional destacado en The Salon Barber.";
        });
    </script>
</body>
</html>
