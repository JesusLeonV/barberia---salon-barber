<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración | The Salon Barber</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent-gold: #eab308; --bg-surface: #1a1a1a; --border-subtle: #333; }
        body { background: #0f0f0f; color: white; font-family: sans-serif; }
        .admin-container { max-width: 500px; margin: 40px auto; padding: 20px; }
        .card { background: var(--bg-surface); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .btn-volver { color: var(--accent-gold); text-decoration: none; font-size: 14px; margin-bottom: 20px; display: inline-block; }
        .bloqueo-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px; background: #252525; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--accent-gold);
        }
        .date-badge { font-weight: bold; color: var(--accent-gold); }
        .cal-day { font-size: 14px; }
        .cal-day.available:hover { background: rgba(234, 179, 8, 0.12); }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="/" class="btn-volver"><i class="fa-solid fa-arrow-left"></i> Volver al sitio</a>
        
        <div class="card">
            <h2 style="margin-top:0; color:var(--accent-gold); text-align:center;">Gestión de Ausencias 💈</h2>
            <label>Barbero:</label>
            <select id="select-barbero" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; background:#000; color:white; border:1px solid #444;"></select>
            <p style="font-size:14px; color:#cbd5e1; margin-top:10px;">
                Selecciona un día en el calendario para bloquear la ausencia del barbero.
            </p>
            <div id="mensaje-admin" style="margin-top:15px; text-align:center; font-size: 14px;"></div>
        </div>

        <div class="bloqueos-lista">
            <h3 style="font-size:15px; margin-bottom:15px;"><i class="fa-solid fa-calendar-days"></i> Calendario Programado</h3>
            <div id="lista-bloqueos">Cargando...</div>
        </div>

        <div id="calendario-admin" class="card">
            <div class="cal-header">
                <button id="admin-prev-mes" class="cal-nav-btn">◀</button>
                <h3 id="admin-mes-titulo"></h3>
                <button id="admin-next-mes" class="cal-nav-btn">▶</button>
            </div>
            <div id="grid-admin-calendario" class="cal-grid"></div>
        </div>
    </div>

    <script>
        const adminState = {
            selectedBarberoId: null,
            bloqueos: [],
            calendarioMes: new Date()
        };

        // Tus horarios oficiales del sistema
        const horasPosibles = [
            "10:30", "11:10", "11:50", "12:30", "13:10", "13:50", "14:30", "15:10", 
            "15:50", "16:30", "17:10", "17:50", "18:30", "19:10", "19:50", "20:30"
        ];

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('select-barbero').addEventListener('change', () => {
                adminState.selectedBarberoId = document.getElementById('select-barbero').value;
                cargarBloqueosPorBarbero();
            });
            document.getElementById('admin-prev-mes').addEventListener('click', () => cambiarMesAdmin(-1));
            document.getElementById('admin-next-mes').addEventListener('click', () => cambiarMesAdmin(1));
            cargarBarberos();
            cargarListaBloqueos();
        });

        async function cargarBarberos() {
            try {
                const res = await fetch('/api/barberos');
                const barberos = await res.json();
                const select = document.getElementById('select-barbero');
                select.innerHTML = barberos.map(b => `<option value="${b.id}">${b.nombre}</option>`).join('');
                if (barberos.length > 0) {
                    adminState.selectedBarberoId = barberos[0].id;
                    cargarBloqueosPorBarbero();
                }
            } catch (err) {
                console.error('Error cargando barberos:', err);
            }
        }

        async function cargarListaBloqueos() {
            try {
                const res = await fetch('/api/lista-bloqueos');
                const bloqueos = await res.json();
                const contenedor = document.getElementById('lista-bloqueos');
                if (!bloqueos || bloqueos.length === 0) {
                    contenedor.innerHTML = '<p style="color:#555; text-align:center;">Sin días bloqueados</p>';
                    return;
                }
                contenedor.innerHTML = bloqueos.map(l => {
                    const soloFecha = l.fecha.split('T')[0]; 
                    const fechaObj = new Date(soloFecha + 'T12:00:00'); 
                    const fechaFormateada = fechaObj.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
                    
                    const textoFecha = l.tipo === 'parcial' ? `${fechaFormateada}<br><span style="color:#aaa; font-size:11px;">(${l.hora_inicio} a ${l.hora_fin})</span>` : fechaFormateada;
                    const etiquetaTipo = l.tipo === 'parcial' ? '<span style="color:#eab308; font-size:10px; margin-left:5px; padding:2px 6px; background:rgba(234,179,8,0.2); border-radius:4px;">PARCIAL</span>' : '';

                    return `
                        <div class="bloqueo-item" style="align-items: flex-start;">
                            <div style="flex:1;">
                                <span style="display:block; font-weight:bold; margin-bottom:5px; color: white;">
                                    <i class="fa-solid fa-user-scissors"></i> ${l.barbero_nombre} ${etiquetaTipo}
                                </span>
                                <span style="font-size: 12px; color: #aaa;">
                                    <i class="fa-solid fa-circle-info" style="color:var(--accent-gold);"></i> ${l.motivo || 'Día libre'}
                                </span>
                            </div>
                            <span class="date-badge" style="text-align:right;">${textoFecha}</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Error cargando bloqueos:', err);
            }
        }

        async function cargarBloqueosPorBarbero() {
            if (!adminState.selectedBarberoId) return;
            try {
                const res = await fetch(`/api/fechas-bloqueadas/${adminState.selectedBarberoId}?admin=true`);
                const fechas = await res.json();
                adminState.bloqueos = Array.isArray(fechas) ? fechas : [];
                renderCalendarioAdmin();
            } catch (err) {
                console.error('Error cargando bloqueos por barbero:', err);
            }
        }

        async function procesarClicDiaAdmin(fechaStr) {
            const barbero_id = document.getElementById('select-barbero').value;
            const mensaje = document.getElementById('mensaje-admin');
            mensaje.innerText = '';
            if (!fechaStr || !barbero_id) return;

            const estaBloqueado = adminState.bloqueos.includes(fechaStr);

            if (estaBloqueado) {
                // ELIMINAR BLOQUEO
                const confirmar = confirm(`¿Estás seguro de que deseas ELIMINAR la ausencia del día ${fechaStr}?`);
                if (!confirmar) return;

                try {
                    const res = await fetch('/api/bloquear-dia', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ barbero_id, fecha: fechaStr })
                    });
                    
                    if (res.ok) {
                        mensaje.style.color = '#a3e635';
                        mensaje.innerText = '✅ Día habilitado nuevamente: ' + fechaStr;
                        cargarListaBloqueos();
                        cargarBloqueosPorBarbero();
                    } else {
                        mensaje.style.color = '#ef4444';
                        mensaje.innerText = 'No se pudo eliminar el bloqueo.';
                    }
                } catch (err) {
                    console.error('Error:', err);
                    mensaje.style.color = '#ef4444';
                    mensaje.innerText = 'Error de conexión.';
                }

            } else {
                // AGREGAR BLOQUEO CON HORAS
                const confirmar = confirm(`¿Deseas BLOQUEAR el día ${fechaStr}?`);
                if (!confirmar) return;

                const esDiaCompleto = confirm(`¿La ausencia será por TODO EL DÍA?\n\n[Aceptar] = Día Completo\n[Cancelar] = Elegir rango de Horas`);

                let tipo = 'completo';
                let hora_inicio = null;
                let hora_fin = null;

                if (!esDiaCompleto) {
                    tipo = 'parcial';
                    // Creamos el texto de la lista de horas para mostrarlo en el mensaje
                    const textoListaHoras = horasPosibles.join(" | ");

                    // Pedimos hora de inicio
                    let inputInicio = prompt(`HORA DE INICIO (Escribe exactamente como aparece en la lista):\n\n${textoListaHoras}\n\n`, "14:30");
                    if (!inputInicio) return;
                    hora_inicio = inputInicio.trim();

                    if (!horasPosibles.includes(hora_inicio)) {
                        alert(`❌ ERROR: La hora "${hora_inicio}" no es válida. Debe ser exactamente igual a las opciones.`);
                        return; // Cancela si escribió algo mal
                    }
                    
                    // Pedimos hora de fin
                    let inputFin = prompt(`HORA DE FIN (Escribe exactamente como aparece en la lista):\n\n${textoListaHoras}\n\n`, "16:30");
                    if (!inputFin) return;
                    hora_fin = inputFin.trim();

                    if (!horasPosibles.includes(hora_fin)) {
                        alert(`❌ ERROR: La hora "${hora_fin}" no es válida. Debe ser exactamente igual a las opciones.`);
                        return; // Cancela si escribió algo mal
                    }
                }

                let motivo = prompt("Ingresa el motivo (Ej: Vacaciones, Licencia, Descanso):", tipo === 'completo' ? "Día libre" : "Trámite");
                if (motivo === null) return; 

                try {
                    const res = await fetch('/api/bloquear-dia', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ barbero_id, fecha: fechaStr, motivo, tipo, hora_inicio, hora_fin })
                    });
                    
                    if (res.ok) {
                        mensaje.style.color = '#a3e635';
                        mensaje.innerText = '✅ Día bloqueado con éxito: ' + fechaStr;
                        cargarListaBloqueos();
                        cargarBloqueosPorBarbero(); 
                    } else {
                        mensaje.style.color = '#ef4444';
                        mensaje.innerText = 'No se pudo bloquear la fecha.';
                    }
                } catch (err) {
                    console.error('Error:', err);
                    mensaje.style.color = '#ef4444';
                    mensaje.innerText = 'Error de conexión.';
                }
            }
        }

        function renderCalendarioAdmin() {
            const grid = document.getElementById('grid-admin-calendario');
            const titulo = document.getElementById('admin-mes-titulo');
            if (!grid || !titulo) return;

            const mes = adminState.calendarioMes.getMonth();
            const anio = adminState.calendarioMes.getFullYear();
            titulo.innerText = adminState.calendarioMes.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            
            const diasSemana = ['Lu','Ma','Mi','Ju','Vi','Sa','Do'];
            const primerDia = new Date(anio, mes, 1).getDay() || 7;
            const diasEnMes = new Date(anio, mes + 1, 0).getDate();
            
            let html = '';
            diasSemana.forEach(d => html += `<div style="font-weight:bold; color:var(--text-secondary); text-align:center; padding-bottom:10px;">${d}</div>`);
            
            for (let i = 1; i < primerDia; i++) html += '<div></div>';
            
            for (let i = 1; i <= diasEnMes; i++) {
                const fechaStr = `${anio}-${String(mes + 1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const bloqueado = adminState.bloqueos.includes(fechaStr);
                
                const estiloFondo = bloqueado ? 'background: #111; color: #666; border: 1px solid #333;' : 'background: #252525; border: 1px solid #444;';
                
                html += `
                    <div class="dia-celda" 
                         style="padding: 15px 0; text-align: center; border-radius: 8px; cursor: pointer; ${estiloFondo}" 
                         title="${bloqueado ? 'Clic para Desbloquear' : 'Clic para Bloquear'}" 
                         onclick="procesarClicDiaAdmin('${fechaStr}')">
                        ${i}
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        function cambiarMesAdmin(dir) {
            adminState.calendarioMes.setMonth(adminState.calendarioMes.getMonth() + dir);
            renderCalendarioAdmin();
        }
    </script>
</body>
</html>
